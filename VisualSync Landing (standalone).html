  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        if (!entry.compressed && entry.mime.indexOf('image/') === 0) {
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' + entry.data;
          return;
        }
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"67d416c5-63e2-4463-8126-deb874b57f81\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"d682fbbc-8883-45e8-aa24-c825356d0b23\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"e16e488d-191e-4daf-ada9-ccca69c99643\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ===== VisualSync landing ===== */\n/* Web fonts also loaded via <link> in the HTML for runtime; declared here so the\n   design-system compiler can resolve the families. Variable-font files cover all weights. */\n@font-face{\n  font-family:'Space Grotesk'; font-style:normal; font-weight:300 700; font-display:swap;\n  src:url(https://fonts.gstatic.com/s/spacegrotesk/v16/V8mQoQDjQSkFtoMM3T6r8E7mF71Q-gOoraIAEj7oUUs.woff2) format('woff2');\n}\n@font-face{\n  font-family:'JetBrains Mono'; font-style:normal; font-weight:100 800; font-display:swap;\n  src:url(https://fonts.gstatic.com/s/jetbrainsmono/v18/tDbY2o-flEEny0FZhsfKu5WU4zr3E_BX0PnT8RD8yKxjPVmUsaaDhw.woff2) format('woff2');\n}\n:root{\n  --bg:#0c0d10;\n  --bg-2:#101216;\n  --panel:#14161b;\n  --panel-2:#181b21;\n  --line:rgba(255,255,255,.08);\n  --line-2:rgba(255,255,255,.14);\n  --t1:#f4f5f7;\n  --t2:#aeb2bb;\n  --t3:#787c86;\n  --t4:#565a63;\n  --accent:#3b82f6;\n  --accent-hi:#6aa8ff;\n  --accent-soft:rgba(59,130,246,.14);\n  --disp:\"Space Grotesk\",-apple-system,BlinkMacSystemFont,sans-serif; /* @kind font */\n  --ui:-apple-system,BlinkMacSystemFont,\"Helvetica Neue\",Helvetica,sans-serif; /* @kind font */\n  --mono:\"JetBrains Mono\",ui-monospace,\"SF Mono\",Menlo,monospace; /* @kind font */\n  --maxw:1180px;\n}\n*{box-sizing:border-box;margin:0;padding:0;}\nhtml{scroll-behavior:smooth;}\nbody{\n  font-family:var(--ui); color:var(--t1); background:var(--bg);\n  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;\n  line-height:1.5; overflow-x:hidden;\n}\na{color:inherit;text-decoration:none;}\n.wrap{max-width:var(--maxw);margin:0 auto;padding:0 32px;}\n.mono{font-family:var(--mono);}\n.eyebrow{\n  font-family:var(--mono); font-size:12px; letter-spacing:1.6px; text-transform:uppercase;\n  color:var(--accent-hi); display:inline-flex; align-items:center; gap:9px;\n}\n.eyebrow::before{content:\"\";width:22px;height:1px;background:var(--accent-hi);opacity:.6;}\n\n/* ---------- nav ---------- */\nnav{\n  position:sticky; top:0; z-index:50;\n  background:rgba(12,13,16,.72); backdrop-filter:blur(18px) saturate(1.4);\n  border-bottom:1px solid var(--line);\n}\n.nav-in{max-width:var(--maxw);margin:0 auto;padding:14px 32px;display:flex;align-items:center;gap:30px;}\n.brand{display:flex;align-items:center;gap:11px;}\n.brand .mk{\n  width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex:0 0 30px;\n  background:linear-gradient(157deg,var(--accent-hi),var(--accent));\n  box-shadow:0 3px 9px -2px var(--accent-soft),inset 0 1px 0 rgba(255,255,255,.4);\n}\n.brand .mk svg{width:62%;height:62%;stroke:#fff;fill:none;}\n.brand b{font-family:var(--disp);font-weight:600;font-size:16px;letter-spacing:-.2px;}\n.nav-links{display:flex;gap:4px;margin-left:8px;}\n.nav-links a{font-size:13.5px;color:var(--t2);padding:7px 12px;border-radius:8px;font-weight:500;}\n.nav-links a:hover{color:var(--t1);background:rgba(255,255,255,.05);}\n.nav-right{margin-left:auto;display:flex;align-items:center;gap:14px;}\n.accents{display:flex;gap:7px;align-items:center;}\n.accents .sw{width:15px;height:15px;border-radius:50%;cursor:pointer;border:2px solid transparent;}\n.accents .sw[data-on]{border-color:var(--t1);}\n.lang{display:flex;font-family:var(--mono);font-size:12px;border:1px solid var(--line-2);border-radius:8px;overflow:hidden;}\n.lang button{background:none;border:none;color:var(--t3);padding:6px 10px;cursor:pointer;font-family:inherit;font-size:12px;}\n.lang button[data-on]{background:var(--accent);color:#fff;}\n.btn{\n  display:inline-flex;align-items:center;gap:8px;height:38px;padding:0 16px;border-radius:9px;\n  font-size:13.5px;font-weight:600;cursor:pointer;border:1px solid transparent;white-space:nowrap;\n}\n.btn svg{width:15px;height:15px;}\n.btn-pri{background:linear-gradient(180deg,var(--accent-hi),var(--accent));color:#fff;box-shadow:0 5px 16px -6px var(--accent),inset 0 1px 0 rgba(255,255,255,.3);}\n.btn-pri:hover{filter:brightness(1.06);}\n.btn-ghost{background:var(--panel-2);border-color:var(--line-2);color:var(--t1);}\n.btn-ghost:hover{background:#1f232a;}\n\n/* ---------- hero ---------- */\n.hero{position:relative;padding:88px 0 70px;text-align:center;overflow:hidden;}\n.hero::before{\n  content:\"\";position:absolute;inset:0;z-index:-1;\n  background:\n    radial-gradient(820px 420px at 50% -8%, var(--accent-soft) 0%, transparent 62%),\n    radial-gradient(600px 360px at 88% 8%, rgba(120,90,255,.08) 0%, transparent 60%);\n}\n.hero h1{\n  font-family:var(--disp);font-weight:600;letter-spacing:-1.6px;line-height:1.02;\n  font-size:clamp(40px,6vw,72px);margin:22px auto 0;max-width:14ch;\n}\n.hero h1 em{font-style:normal;color:var(--accent-hi);}\n.hero .lede{font-size:clamp(16px,2vw,19px);color:var(--t2);max-width:56ch;margin:22px auto 0;line-height:1.6;}\n.hero .cta{display:flex;gap:13px;justify-content:center;margin-top:32px;flex-wrap:wrap;}\n.hero .cta .btn{height:46px;padding:0 22px;font-size:15px;border-radius:11px;}\n.hero .meta{margin-top:20px;font-family:var(--mono);font-size:12px;color:var(--t3);letter-spacing:.3px;}\n.shot{\n  margin:62px auto 0;max-width:1120px;border-radius:16px;overflow:hidden;\n  border:1px solid var(--line-2);\n  box-shadow:0 40px 90px -40px rgba(0,0,0,.9),0 0 0 1px rgba(255,255,255,.03),0 -1px 0 rgba(255,255,255,.06) inset;\n}\n.shot img{display:block;width:100%;}\n\n/* ---------- generic section ---------- */\nsection.block{padding:96px 0;border-top:1px solid var(--line);}\n.sec-head{max-width:680px;}\n.sec-head h2{font-family:var(--disp);font-weight:600;font-size:clamp(28px,3.6vw,42px);letter-spacing:-.8px;margin-top:16px;line-height:1.08;}\n.sec-head p{color:var(--t2);font-size:16.5px;margin-top:16px;line-height:1.6;}\n\n/* overview statement */\n.statement{font-family:var(--disp);font-weight:500;font-size:clamp(22px,3vw,32px);line-height:1.32;letter-spacing:-.4px;max-width:20ch;}\n.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start;}\n.overview-grid .body p{color:var(--t2);font-size:16px;line-height:1.7;}\n.overview-grid .body p+p{margin-top:18px;}\n.kvs{margin-top:28px;display:flex;flex-direction:column;gap:14px;}\n.kv{display:flex;gap:14px;align-items:baseline;padding-bottom:14px;border-bottom:1px solid var(--line);}\n.kv .k{font-family:var(--mono);font-size:12px;color:var(--accent-hi);flex:0 0 96px;letter-spacing:.4px;}\n.kv .v{color:var(--t1);font-size:14.5px;}\n\n/* features */\n.feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:54px;}\n.feat{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:26px 24px;transition:border-color .15s,background .15s;}\n.feat:hover{border-color:var(--line-2);background:var(--panel-2);}\n.feat .ic{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent-hi);margin-bottom:18px;}\n.feat .ic svg{width:21px;height:21px;stroke:currentColor;fill:none;}\n.feat h3{font-size:17px;font-weight:640;letter-spacing:-.2px;}\n.feat .flag{font-family:var(--mono);font-size:11px;color:var(--t2);background:rgba(255,255,255,.06);border:1px solid var(--line);padding:1px 6px;border-radius:5px;margin-left:7px;font-weight:500;}\n.feat p{color:var(--t3);font-size:14px;line-height:1.6;margin-top:9px;}\n\n/* guide steps */\n.steps{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;margin-top:54px;counter-reset:s;}\n.step{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:26px 26px 26px 78px;}\n.step::before{\n  counter-increment:s;content:\"0\" counter(s);\n  position:absolute;left:24px;top:24px;font-family:var(--mono);font-size:15px;font-weight:600;\n  color:var(--accent-hi);width:38px;height:38px;border-radius:10px;display:grid;place-items:center;\n  background:var(--accent-soft);border:1px solid rgba(106,168,255,.2);\n}\n.step h3{font-size:16.5px;font-weight:640;}\n.step p{color:var(--t3);font-size:14px;line-height:1.6;margin-top:8px;}\n\n/* download */\n.dl{display:grid;grid-template-columns:1.1fr .9fr;gap:24px;margin-top:54px;}\n.dl-card{background:linear-gradient(160deg,var(--panel-2),var(--panel));border:1px solid var(--line-2);border-radius:18px;padding:36px;}\n.dl-card .ver{font-family:var(--mono);font-size:12px;color:var(--accent-hi);}\n.dl-card h3{font-family:var(--disp);font-size:26px;font-weight:600;margin-top:8px;letter-spacing:-.4px;}\n.dl-card p{color:var(--t2);font-size:14.5px;margin-top:10px;line-height:1.6;}\n.dl-card .cta{display:flex;gap:12px;margin-top:24px;flex-wrap:wrap;}\n.dl-card .cta .btn{height:46px;padding:0 22px;font-size:15px;border-radius:11px;}\n.brew{margin-top:20px;display:flex;align-items:center;gap:12px;background:#0a0b0e;border:1px solid var(--line);border-radius:10px;padding:13px 16px;font-family:var(--mono);font-size:13px;color:var(--t2);}\n.brew .dollar{color:var(--t4);}\n.brew .copy{margin-left:auto;color:var(--t3);cursor:pointer;}\n.brew .copy:hover{color:var(--t1);}\n.req{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:32px;display:flex;flex-direction:column;gap:18px;}\n.req .ri{display:flex;gap:14px;align-items:flex-start;}\n.req .ri svg{width:18px;height:18px;stroke:var(--accent-hi);fill:none;flex:0 0 18px;margin-top:2px;}\n.req .ri b{font-size:14.5px;font-weight:600;display:block;}\n.req .ri span{font-size:13px;color:var(--t3);}\n\n/* changelog */\n.log{margin-top:48px;display:flex;flex-direction:column;}\n.logrow{display:grid;grid-template-columns:160px 1fr;gap:32px;padding:26px 0;border-top:1px solid var(--line);}\n.logrow:last-child{border-bottom:1px solid var(--line);}\n.logrow .meta .v{font-family:var(--disp);font-size:20px;font-weight:600;}\n.logrow .meta .d{font-family:var(--mono);font-size:12px;color:var(--t3);margin-top:4px;}\n.logrow .meta .tag{display:inline-block;margin-top:10px;font-family:var(--mono);font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--accent-hi);border:1px solid rgba(106,168,255,.25);border-radius:20px;padding:3px 10px;}\n.logrow ul{list-style:none;display:flex;flex-direction:column;gap:9px;}\n.logrow li{position:relative;padding-left:20px;color:var(--t2);font-size:14.5px;line-height:1.5;}\n.logrow li::before{content:\"\";position:absolute;left:2px;top:9px;width:5px;height:5px;border-radius:50%;background:var(--accent);}\n\n/* about */\n.about{display:grid;grid-template-columns:300px 1fr;gap:56px;align-items:start;}\n.photo{aspect-ratio:4/5;border-radius:18px;border:1px solid var(--line-2);overflow:hidden;position:relative;background:\n  repeating-linear-gradient(135deg,#15171c 0 11px,#181b21 11px 22px);}\n.photo .ph{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--mono);font-size:12px;color:var(--t4);letter-spacing:.5px;}\n.about .who h2{font-family:var(--disp);font-size:clamp(28px,3.4vw,38px);font-weight:600;letter-spacing:-.6px;}\n.about .who .role{font-family:var(--mono);font-size:13px;color:var(--accent-hi);margin-top:8px;letter-spacing:.4px;}\n.about .who p{color:var(--t2);font-size:16px;line-height:1.7;margin-top:20px;max-width:60ch;}\n.about .who p+p{margin-top:16px;}\n\n/* projects */\n.proj-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:48px;}\n.proj{background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;transition:border-color .15s,transform .15s;}\n.proj:hover{border-color:var(--line-2);transform:translateY(-3px);}\n.proj .thumb{aspect-ratio:16/10;background:repeating-linear-gradient(135deg,#15171c 0 11px,#181b21 11px 22px);display:grid;place-items:center;border-bottom:1px solid var(--line);position:relative;}\n.proj .thumb .badge{font-family:var(--mono);font-size:11px;color:var(--t4);}\n.proj .pb{padding:20px 22px 24px;}\n.proj .pcat{font-family:var(--mono);font-size:11px;color:var(--accent-hi);letter-spacing:.6px;text-transform:uppercase;}\n.proj h3{font-size:17px;font-weight:640;margin-top:9px;display:flex;align-items:center;gap:7px;}\n.proj h3 svg{width:14px;height:14px;stroke:var(--t3);fill:none;}\n.proj p{color:var(--t3);font-size:13.5px;line-height:1.6;margin-top:8px;}\n\n/* footer / contact */\nfooter{border-top:1px solid var(--line);padding:80px 0 40px;background:var(--bg-2);}\n.foot-top{display:grid;grid-template-columns:1.4fr 1fr;gap:48px;align-items:end;}\n.foot-cta h2{font-family:var(--disp);font-size:clamp(26px,3.2vw,38px);font-weight:600;letter-spacing:-.6px;line-height:1.1;}\n.foot-cta p{color:var(--t2);font-size:16px;margin-top:14px;max-width:46ch;line-height:1.6;}\n.socials{display:flex;flex-wrap:wrap;gap:10px;justify-content:flex-end;}\n.social{display:inline-flex;align-items:center;gap:9px;padding:11px 16px;border-radius:10px;border:1px solid var(--line-2);background:var(--panel);font-size:13.5px;font-weight:500;color:var(--t1);}\n.social:hover{background:var(--panel-2);border-color:var(--accent);}\n.social svg{width:16px;height:16px;stroke:currentColor;fill:none;}\n.foot-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:64px;padding-top:24px;border-top:1px solid var(--line);font-size:12.5px;color:var(--t4);font-family:var(--mono);flex-wrap:wrap;gap:12px;}\n\n/* responsive */\n@media(max-width:900px){\n  .nav-links{display:none;}\n  .overview-grid,.dl,.about,.foot-top{grid-template-columns:1fr;gap:32px;}\n  .feat-grid,.proj-grid{grid-template-columns:1fr 1fr;}\n  .steps{grid-template-columns:1fr;}\n  .logrow{grid-template-columns:1fr;gap:14px;}\n  .socials{justify-content:flex-start;}\n}\n@media(max-width:600px){\n  .feat-grid,.proj-grid{grid-template-columns:1fr;}\n  .wrap,.nav-in{padding-left:20px;padding-right:20px;}\n}\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n<!-- ======== NAV ======== -->\n<nav>\n  <div class=\"nav-in\">\n    <a class=\"brand\" href=\"#top\">\n      <span class=\"mk\"><svg viewBox=\"0 0 24 24\" stroke-width=\"2.1\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 12a9 9 0 0 1 15-6.7L21 8\"><\u002Fpath><path d=\"M21 3.5v4.5h-4.5\"><\u002Fpath><path d=\"M21 12a9 9 0 0 1-15 6.7L3 16\"><\u002Fpath><path d=\"M3 20.5v-4.5h4.5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n      <b>VisualSync<\u002Fb>\n    <\u002Fa>\n    <div class=\"nav-links\">\n      <a href=\"#overview\" data-en=\"Overview\" data-it=\"Panoramica\">Overview<\u002Fa>\n      <a href=\"#features\" data-en=\"Features\" data-it=\"Funzioni\">Features<\u002Fa>\n      <a href=\"#guide\" data-en=\"Guide\" data-it=\"Guida\">Guide<\u002Fa>\n      <a href=\"#download\" data-en=\"Download\" data-it=\"Download\">Download<\u002Fa>\n      <a href=\"#about\" data-en=\"About\" data-it=\"Chi sono\">About<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"nav-right\">\n      <div class=\"accents\" title=\"Accent\">\n        <span class=\"sw\" data-accent=\"sky\" style=\"background:#3b82f6\" data-on=\"\"><\u002Fspan>\n        <span class=\"sw\" data-accent=\"indigo\" style=\"background:#5a4fe6\"><\u002Fspan>\n        <span class=\"sw\" data-accent=\"ocean\" style=\"background:#2f8ce6\"><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"lang\">\n        <button data-lang=\"en\" data-on=\"\">EN<\u002Fbutton>\n        <button data-lang=\"it\">IT<\u002Fbutton>\n      <\u002Fdiv>\n      <a href=\"#download\" class=\"btn btn-pri\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3v12m0 0 4-4m-4 4-4-4\"><\u002Fpath><path d=\"M5 21h14\"><\u002Fpath><\u002Fsvg>\n        <span data-en=\"Download\" data-it=\"Scarica\">Download<\u002Fspan>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<a id=\"top\"><\u002Fa>\n\n<!-- ======== HERO ======== -->\n<header class=\"hero\">\n  <div class=\"wrap\">\n    <span class=\"eyebrow\" data-en=\"Native macOS · rsync front-end\" data-it=\"macOS nativo · front-end per rsync\">Native macOS · rsync front-end<\u002Fspan>\n    <h1 data-en=\"rsync, without the &lt;em&gt;terminal&lt;/em&gt;.\" data-it=\"rsync, senza il &lt;em&gt;terminale&lt;/em&gt;.\"><\u002Fh1>\n    <p class=\"lede\" data-en=\"VisualSync is a native macOS app for backing up and mirroring folders. All the power of rsync — saved profiles, archive mode, dry runs — driven by checkboxes and a clear two-pane view.\" data-it=\"VisualSync è un'app macOS nativa per backup e mirroring di cartelle. Tutta la potenza di rsync — profili salvati, modalità archivio, prove a vuoto — guidata da caselle e una vista a due pannelli chiara.\">VisualSync is a native macOS app for backing up and mirroring folders. All the power of rsync — saved profiles, archive mode, dry runs — driven by checkboxes and a clear two-pane view.<\u002Fp>\n    <div class=\"cta\">\n      <a href=\"#download\" class=\"btn btn-pri\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3v12m0 0 4-4m-4 4-4-4\"><\u002Fpath><path d=\"M5 21h14\"><\u002Fpath><\u002Fsvg>\n        <span data-en=\"Download for macOS\" data-it=\"Scarica per macOS\">Download for macOS<\u002Fspan>\n      <\u002Fa>\n      <a href=\"#guide\" class=\"btn btn-ghost\">\n        <span data-en=\"See how it works\" data-it=\"Come funziona\">See how it works<\u002Fspan>\n      <\u002Fa>\n    <\u002Fdiv>\n    <p class=\"meta\" data-en=\"Free · macOS 12+ · Apple Silicon &amp; Intel\" data-it=\"Gratis · macOS 12+ · Apple Silicon e Intel\">Free · macOS 12+ · Apple Silicon &amp; Intel<\u002Fp>\n\n    <div class=\"shot\">\n      <img src=\"05409bc1-5c85-4f0f-8679-871793b3b3f9\" alt=\"VisualSync app window\">\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ======== OVERVIEW ======== -->\n<section class=\"block\" id=\"overview\">\n  <div class=\"wrap overview-grid\">\n    <div>\n      <span class=\"eyebrow\" data-en=\"What it is\" data-it=\"Cos'è\">What it is<\u002Fspan>\n      <p class=\"statement\" data-en=\"rsync is the best backup tool on the Mac. Its interface just happens to be a manual page.\" data-it=\"rsync è il miglior strumento di backup su Mac. Solo che la sua interfaccia è una pagina di manuale.\">rsync is the best backup tool on the Mac. Its interface just happens to be a manual page.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"body\">\n      <p data-en=\"VisualSync wraps rsync in a calm, native interface. You see your source and destination side by side, tick exactly what to sync, and flip options like archive mode or compression as plain switches — each one labeled with the flag it maps to.\" data-it=\"VisualSync avvolge rsync in un'interfaccia nativa e ordinata. Vedi sorgente e destinazione affiancate, spunti esattamente cosa sincronizzare e attivi opzioni come modalità archivio o compressione con semplici interruttori — ognuno etichettato con il flag corrispondente.\">VisualSync wraps rsync in a calm, native interface. You see your source and destination side by side, tick exactly what to sync, and flip options like archive mode or compression as plain switches — each one labeled with the flag it maps to.<\u002Fp>\n      <p data-en=\"Save a setup once as a profile and re-run it in a click. Always preview with a dry run before anything touches disk. No memorizing flags, no fear of --delete.\" data-it=\"Salva una configurazione come profilo e rilanciala con un clic. Visualizza sempre l'anteprima con una prova a vuoto prima che qualcosa tocchi il disco. Niente flag da memorizzare, nessuna paura di --delete.\">Save a setup once as a profile and re-run it in a click. Always preview with a dry run before anything touches disk. No memorizing flags, no fear of --delete.<\u002Fp>\n      <div class=\"kvs\">\n        <div class=\"kv\"><span class=\"k\">ENGINE<\u002Fspan><span class=\"v\" data-en=\"Real rsync under the hood — fully compatible\" data-it=\"rsync vero sotto il cofano — totalmente compatibile\">Real rsync under the hood — fully compatible<\u002Fspan><\u002Fdiv>\n        <div class=\"kv\"><span class=\"k\">NATIVE<\u002Fspan><span class=\"v\" data-en=\"SwiftUI app, signed &amp; notarized\" data-it=\"App SwiftUI, firmata e notarizzata\">SwiftUI app, signed &amp; notarized<\u002Fspan><\u002Fdiv>\n        <div class=\"kv\"><span class=\"k\">PRIVATE<\u002Fspan><span class=\"v\" data-en=\"Runs locally — nothing leaves your Mac\" data-it=\"Gira in locale — niente lascia il tuo Mac\">Runs locally — nothing leaves your Mac<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ======== FEATURES ======== -->\n<section class=\"block\" id=\"features\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <span class=\"eyebrow\" data-en=\"Features\" data-it=\"Funzioni\">Features<\u002Fspan>\n      <h2 data-en=\"Everything rsync does, where you can see it\" data-it=\"Tutto ciò che fa rsync, ma a vista\">Everything rsync does, where you can see it<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"feat-grid\">\n      <div class=\"feat\">\n        <div class=\"ic\"><svg viewBox=\"0 0 24 24\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 12a9 9 0 0 1-9 9 9 9 0 1 1 9-9z\"><\u002Fpath><path d=\"m8 12 3 3 5-6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3 data-en=\"Saved profiles\" data-it=\"Profili salvati\">Saved profiles<\u002Fh3>\n        <p data-en=\"Store source, destination and options as a named profile. Re-run any backup with a single click.\" data-it=\"Salva sorgente, destinazione e opzioni come profilo. Rilancia ogni backup con un solo clic.\">Store source, destination and options as a named profile. Re-run any backup with a single click.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat\">\n        <div class=\"ic\"><svg viewBox=\"0 0 24 24\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"5\" width=\"7\" height=\"14\" rx=\"1.5\"><\u002Frect><rect x=\"14\" y=\"5\" width=\"7\" height=\"14\" rx=\"1.5\"><\u002Frect><\u002Fsvg><\u002Fdiv>\n        <h3 data-en=\"Two-pane view\" data-it=\"Vista a due pannelli\">Two-pane view<\u002Fh3>\n        <p data-en=\"Source and destination trees side by side, with checkboxes on every folder and file. See exactly what moves.\" data-it=\"Alberi di sorgente e destinazione affiancati, con caselle su ogni cartella e file. Vedi esattamente cosa si sposta.\">Source and destination trees side by side, with checkboxes on every folder and file. See exactly what moves.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat\">\n        <div class=\"ic\"><svg viewBox=\"0 0 24 24\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 7h16M4 12h16M4 17h16\"><\u002Fpath><circle cx=\"8\" cy=\"7\" r=\"2\" fill=\"currentColor\" stroke=\"none\"><\u002Fcircle><circle cx=\"16\" cy=\"17\" r=\"2\" fill=\"currentColor\" stroke=\"none\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n        <h3>rsync flags <span class=\"flag\">-a -z<\u002Fspan><\u002Fh3>\n        <p data-en=\"Archive mode, compression, delete-extraneous and more as labeled switches — no cheat sheet required.\" data-it=\"Modalità archivio, compressione, eliminazione e altro come interruttori etichettati — senza bisogno di promemoria.\">Archive mode, compression, delete-extraneous and more as labeled switches — no cheat sheet required.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat\">\n        <div class=\"ic\"><svg viewBox=\"0 0 24 24\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 7v5l3 2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3 data-en=\"Dry run preview\" data-it=\"Anteprima a vuoto\">Dry run preview<\u002Fh3>\n        <p data-en=\"Run with -n to see every change before it happens. Nothing touches disk until you say so.\" data-it=\"Esegui con -n per vedere ogni modifica prima che avvenga. Niente tocca il disco finché non decidi tu.\">Run with -n to see every change before it happens. Nothing touches disk until you say so.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat\">\n        <div class=\"ic\"><svg viewBox=\"0 0 24 24\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"8\" y=\"3\" width=\"8\" height=\"4\" rx=\"1\"><\u002Frect><path d=\"M16 5h2a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3 data-en=\"Paste or browse paths\" data-it=\"Incolla o sfoglia i path\">Paste or browse paths<\u002Fh3>\n        <p data-en=\"Editable path fields above each pane — paste a long path straight in, or pick a folder with the system browser.\" data-it=\"Campi path modificabili sopra ogni pannello — incolla un percorso lungo, o scegli una cartella col browser di sistema.\">Editable path fields above each pane — paste a long path straight in, or pick a folder with the system browser.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat\">\n        <div class=\"ic\"><svg viewBox=\"0 0 24 24\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 3v5h5\"><\u002Fpath><path d=\"M3.05 13A9 9 0 1 0 6 5.3L3 8\"><\u002Fpath><path d=\"M12 7v5l3 2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3 data-en=\"Sync history\" data-it=\"Cronologia\">Sync history<\u002Fh3>\n        <p data-en=\"Every run is logged with timestamp and size, so you always know when a profile last synced.\" data-it=\"Ogni esecuzione è registrata con data e dimensione, così sai sempre quando un profilo è stato sincronizzato.\">Every run is logged with timestamp and size, so you always know when a profile last synced.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ======== GUIDE ======== -->\n<section class=\"block\" id=\"guide\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <span class=\"eyebrow\" data-en=\"Guide\" data-it=\"Guida\">Guide<\u002Fspan>\n      <h2 data-en=\"From zero to synced in five steps\" data-it=\"Da zero a sincronizzato in cinque passi\">From zero to synced in five steps<\u002Fh2>\n      <p data-en=\"No terminal, no man pages. Here's the whole flow.\" data-it=\"Niente terminale, niente pagine di manuale. Ecco l'intero flusso.\">No terminal, no man pages. Here's the whole flow.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"steps\">\n      <div class=\"step\">\n        <h3 data-en=\"Create a profile\" data-it=\"Crea un profilo\">Create a profile<\u002Fh3>\n        <p data-en=\"Hit + in the Profiles list and give your backup a name — e.g. “Photos → NAS”.\" data-it=\"Premi + nella lista Profili e dai un nome al backup — es. “Photos → NAS”.\">Hit + in the Profiles list and give your backup a name — e.g. “Photos → NAS”.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <h3 data-en=\"Set source &amp; destination\" data-it=\"Imposta sorgente e destinazione\">Set source &amp; destination<\u002Fh3>\n        <p data-en=\"Paste the paths into the fields above each pane, or click Browse to pick folders.\" data-it=\"Incolla i percorsi nei campi sopra ogni pannello, o clicca Browse per scegliere le cartelle.\">Paste the paths into the fields above each pane, or click Browse to pick folders.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <h3 data-en=\"Pick what to sync\" data-it=\"Scegli cosa sincronizzare\">Pick what to sync<\u002Fh3>\n        <p data-en=\"Tick the folders and files in the source tree. Toggle options like archive mode or compression.\" data-it=\"Spunta cartelle e file nell'albero sorgente. Attiva opzioni come modalità archivio o compressione.\">Tick the folders and files in the source tree. Toggle options like archive mode or compression.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <h3 data-en=\"Preview with a dry run\" data-it=\"Anteprima con prova a vuoto\">Preview with a dry run<\u002Fh3>\n        <p data-en=\"Keep Dry run on and press Run Sync to see every change rsync would make — safely.\" data-it=\"Tieni Dry run attivo e premi Run Sync per vedere ogni modifica che rsync farebbe — in sicurezza.\">Keep Dry run on and press Run Sync to see every change rsync would make — safely.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <h3 data-en=\"Run it for real\" data-it=\"Esegui davvero\">Run it for real<\u002Fh3>\n        <p data-en=\"Happy with the preview? Turn off Dry run and hit Run Sync. The profile remembers everything for next time.\" data-it=\"Soddisfatto dell'anteprima? Disattiva Dry run e premi Run Sync. Il profilo ricorda tutto per la prossima volta.\">Happy with the preview? Turn off Dry run and hit Run Sync. The profile remembers everything for next time.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <h3 data-en=\"Re-run anytime\" data-it=\"Rilancia quando vuoi\">Re-run anytime<\u002Fh3>\n        <p data-en=\"Select the profile and press play. Sync history shows when it last ran and how much moved.\" data-it=\"Seleziona il profilo e premi play. La cronologia mostra l'ultima esecuzione e quanto è stato spostato.\">Select the profile and press play. Sync history shows when it last ran and how much moved.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ======== DOWNLOAD ======== -->\n<section class=\"block\" id=\"download\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <span class=\"eyebrow\" data-en=\"Download\" data-it=\"Download\">Download<\u002Fspan>\n      <h2 data-en=\"Get VisualSync\" data-it=\"Scarica VisualSync\">Get VisualSync<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"dl\">\n      <div class=\"dl-card\">\n        <span class=\"ver mono\">v1.2.0 · June 2026<\u002Fspan>\n        <h3 data-en=\"Free &amp; open source\" data-it=\"Gratis e open source\">Free &amp; open source<\u002Fh3>\n        <p data-en=\"Download the signed app, or install with Homebrew. Source is on GitHub under the MIT license.\" data-it=\"Scarica l'app firmata, o installa con Homebrew. Il sorgente è su GitHub con licenza MIT.\">Download the signed app, or install with Homebrew. Source is on GitHub under the MIT license.<\u002Fp>\n        <div class=\"cta\">\n          <a href=\"#\" class=\"btn btn-pri\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3v12m0 0 4-4m-4 4-4-4\"><\u002Fpath><path d=\"M5 21h14\"><\u002Fpath><\u002Fsvg>\n            <span data-en=\"Download .dmg\" data-it=\"Scarica .dmg\">Download .dmg<\u002Fspan>\n          <\u002Fa>\n          <a href=\"#\" class=\"btn btn-ghost\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 19c-5 1.5-5-2.5-7-3m14 6v-3.5c0-1 .1-1.4-.5-2 2.8-.3 5.5-1.4 5.5-6a4.6 4.6 0 0 0-1.3-3.2 4.3 4.3 0 0 0-.1-3.2s-1-.3-3.5 1.3a12 12 0 0 0-6.2 0C6.9 2.3 5.9 2.6 5.9 2.6a4.3 4.3 0 0 0-.1 3.2A4.6 4.6 0 0 0 4.5 9c0 4.6 2.7 5.7 5.5 6-.6.6-.6 1.2-.5 2V21\"><\u002Fpath><\u002Fsvg>\n            <span>GitHub<\u002Fspan>\n          <\u002Fa>\n        <\u002Fdiv>\n        <div class=\"brew\">\n          <span class=\"dollar\">$<\u002Fspan>\n          <span>brew install --cask visualsync<\u002Fspan>\n          <span class=\"copy\" id=\"copyBrew\" data-en=\"Copy\" data-it=\"Copia\">Copy<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"req\">\n        <div class=\"ri\">\n          <svg viewBox=\"0 0 24 24\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"13\" rx=\"2\"><\u002Frect><path d=\"M8 21h8m-4-4v4\"><\u002Fpath><\u002Fsvg>\n          <div><b data-en=\"macOS 12 Monterey or later\" data-it=\"macOS 12 Monterey o successivo\">macOS 12 Monterey or later<\u002Fb><span data-en=\"Universal — Apple Silicon &amp; Intel\" data-it=\"Universale — Apple Silicon e Intel\">Universal — Apple Silicon &amp; Intel<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ri\">\n          <svg viewBox=\"0 0 24 24\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2 4 5v6c0 5 3.4 9.4 8 11 4.6-1.6 8-6 8-11V5z\"><\u002Fpath><path d=\"m9 12 2 2 4-4\"><\u002Fpath><\u002Fsvg>\n          <div><b data-en=\"Signed &amp; notarized\" data-it=\"Firmata e notarizzata\">Signed &amp; notarized<\u002Fb><span data-en=\"No Gatekeeper warnings, no workarounds\" data-it=\"Nessun avviso Gatekeeper, nessun aggiramento\">No Gatekeeper warnings, no workarounds<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ri\">\n          <svg viewBox=\"0 0 24 24\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><path d=\"M14 2v6h6\"><\u002Fpath><\u002Fsvg>\n          <div><b data-en=\"~14 MB\" data-it=\"~14 MB\">~14 MB<\u002Fb><span data-en=\"Bundles its own rsync 3.x\" data-it=\"Include il proprio rsync 3.x\">Bundles its own rsync 3.x<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ======== CHANGELOG ======== -->\n<section class=\"block\" id=\"changelog\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <span class=\"eyebrow\" data-en=\"Changelog\" data-it=\"Novità\">Changelog<\u002Fspan>\n      <h2 data-en=\"What's new\" data-it=\"Cosa c'è di nuovo\">What's new<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"log\">\n      <div class=\"logrow\">\n        <div class=\"meta\"><div class=\"v\">1.2.0<\u002Fdiv><div class=\"d\">Jun 2026<\u002Fdiv><div class=\"tag\">Latest<\u002Fdiv><\u002Fdiv>\n        <ul>\n          <li data-en=\"Editable, paste-ready path fields above each pane\" data-it=\"Campi path modificabili e pronti per incollare sopra ogni pannello\">Editable, paste-ready path fields above each pane<\u002Fli>\n          <li data-en=\"Redesigned profiles list with sync-status indicators\" data-it=\"Lista profili ridisegnata con indicatori di stato\">Redesigned profiles list with sync-status indicators<\u002Fli>\n          <li data-en=\"Each rsync option now shows its flag and a plain-language description\" data-it=\"Ogni opzione rsync mostra il flag e una descrizione semplice\">Each rsync option now shows its flag and a plain-language description<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"logrow\">\n        <div class=\"meta\"><div class=\"v\">1.1.0<\u002Fdiv><div class=\"d\">Mar 2026<\u002Fdiv><\u002Fdiv>\n        <ul>\n          <li data-en=\"Dry run mode with full change preview\" data-it=\"Modalità prova a vuoto con anteprima completa delle modifiche\">Dry run mode with full change preview<\u002Fli>\n          <li data-en=\"Sync history per profile\" data-it=\"Cronologia sincronizzazioni per profilo\">Sync history per profile<\u002Fli>\n          <li data-en=\"Compression in transit (-z) toggle\" data-it=\"Interruttore compressione in transito (-z)\">Compression in transit (-z) toggle<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"logrow\">\n        <div class=\"meta\"><div class=\"v\">1.0.0<\u002Fdiv><div class=\"d\">Jan 2026<\u002Fdiv><\u002Fdiv>\n        <ul>\n          <li data-en=\"First public release — two-pane sync, profiles, archive mode\" data-it=\"Prima release pubblica — sync a due pannelli, profili, modalità archivio\">First public release — two-pane sync, profiles, archive mode<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ======== ABOUT ======== -->\n<section class=\"block\" id=\"about\">\n  <div class=\"wrap about\">\n    <div class=\"photo\">\n      <div class=\"ph\">your photo →<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"who\">\n      <span class=\"eyebrow\" data-en=\"About the maker\" data-it=\"Chi l'ha fatta\">About the maker<\u002Fspan>\n      <h2>Carlo<\u002Fh2>\n      <div class=\"role\" data-en=\"Indie developer · macOS &amp; tools\" data-it=\"Sviluppatore indie · macOS e strumenti\">Indie developer · macOS &amp; tools<\u002Fdiv>\n      <p data-en=\"I build small, focused native apps that take something powerful but intimidating and make it feel obvious. VisualSync started as a tool for my own Obsidian-to-OneDrive backups — I was tired of retyping rsync flags and second-guessing --delete.\" data-it=\"Costruisco piccole app native e mirate che prendono qualcosa di potente ma intimidatorio e lo rendono ovvio. VisualSync è nata come strumento per i miei backup da Obsidian a OneDrive — ero stanco di riscrivere i flag di rsync e di avere dubbi su --delete.\">I build small, focused native apps that take something powerful but intimidating and make it feel obvious. VisualSync started as a tool for my own Obsidian-to-OneDrive backups — I was tired of retyping rsync flags and second-guessing --delete.<\u002Fp>\n      <p data-en=\"If it's useful to you too, that's the whole point. Feedback, bug reports and ideas are always welcome.\" data-it=\"Se è utile anche a te, è esattamente lo scopo. Feedback, segnalazioni e idee sono sempre benvenuti.\">If it's useful to you too, that's the whole point. Feedback, bug reports and ideas are always welcome.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ======== PROJECTS ======== -->\n<section class=\"block\" id=\"projects\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <span class=\"eyebrow\" data-en=\"Other projects\" data-it=\"Altri progetti\">Other projects<\u002Fspan>\n      <h2 data-en=\"Things I've built\" data-it=\"Cose che ho creato\">Things I've built<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"proj-grid\">\n      <a class=\"proj\" href=\"#\">\n        <div class=\"thumb\"><span class=\"badge\">project shot<\u002Fspan><\u002Fdiv>\n        <div class=\"pb\">\n          <div class=\"pcat\" data-en=\"macOS app\" data-it=\"App macOS\">macOS app<\u002Fdiv>\n          <h3>VisualSync <svg viewBox=\"0 0 24 24\"><path d=\"M7 17 17 7M9 7h8v8\"><\u002Fpath><\u002Fsvg><\u002Fh3>\n          <p data-en=\"The visual rsync front-end you're looking at.\" data-it=\"Il front-end visuale per rsync che stai guardando.\">The visual rsync front-end you're looking at.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fa>\n      <a class=\"proj\" href=\"#\">\n        <div class=\"thumb\"><span class=\"badge\">project shot<\u002Fspan><\u002Fdiv>\n        <div class=\"pb\">\n          <div class=\"pcat\" data-en=\"Project\" data-it=\"Progetto\">Project<\u002Fdiv>\n          <h3 data-en=\"Project Two\" data-it=\"Progetto Due\">Project Two <svg viewBox=\"0 0 24 24\"><path d=\"M7 17 17 7M9 7h8v8\"><\u002Fpath><\u002Fsvg> =\"#\"><svg viewBox=\"0 0 24 24\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 4l11.7 16H20L8.3 4zM4 20 10 13M14 11 20 4\"><\u002Fpath><\u002Fsvg>X / Twitter<\u002Fa>\n        <a class=\"social\" href=\"#\"><svg viewBox=\"0 0 24 24\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"14\" rx=\"2\"><\u002Frect><path d=\"m3 7 9 6 9-6\"><\u002Fpath><\u002Fsvg>Email<\u002Fa>\n        <a class=\"social\" href=\"#\"><svg viewBox=\"0 0 24 24\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M3.5 9h17M3.5 15h17M12 3a14 14 0 0 0 0 18M12 3a14 14 0 0 1 0 18\"><\u002Fpath><\u002Fsvg><span data-en=\"Website\" data-it=\"Sito\">Website<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot-bottom\">\n      <span>© 2026 Carlo · VisualSync<\u002Fspan>\n      <span data-en=\"Made on a Mac, for the Mac.\" data-it=\"Fatto su Mac, per il Mac.\">Made on a Mac, for the Mac.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n  // ---- language ----\n  const STR = document.querySelectorAll('[data-en]');\n  function applyLang(lang){\n    document.documentElement.lang = lang;\n    STR.forEach(el=>{\n      const v = el.getAttribute('data-'+lang);\n      if(v==null) return;\n      if(/[<&]/.test(v)) el.innerHTML = v; else el.textContent = v;\n    });\n    document.querySelectorAll('.lang button').forEach(b=>{\n      b.toggleAttribute('data-on', b.dataset.lang===lang);\n    });\n    localStorage.setItem('vs_lang', lang);\n  }\n  document.querySelectorAll('.lang button').forEach(b=>{\n    b.addEventListener('click',()=>applyLang(b.dataset.lang));\n  });\n\n  // ---- accent ----\n  const ACC = {\n    sky:    {a:'#3b82f6', hi:'#6aa8ff', soft:'rgba(59,130,246,.14)'},\n    indigo: {a:'#5a4fe6', hi:'#8b8bff', soft:'rgba(123,123,255,.15)'},\n    ocean:  {a:'#2f8ce6', hi:'#43d2e6', soft:'rgba(47,140,230,.15)'},\n  };\n  function applyAccent(name){\n    const c = ACC[name]; if(!c) return;\n    const r = document.documentElement.style;\n    r.setProperty('--accent', c.a);\n    r.setProperty('--accent-hi', c.hi);\n    r.setProperty('--accent-soft', c.soft);\n    document.querySelectorAll('.accents .sw').forEach(s=>s.toggleAttribute('data-on', s.dataset.accent===name));\n    localStorage.setItem('vs_accent', name);\n  }\n  document.querySelectorAll('.accents .sw').forEach(s=>{\n    s.addEventListener('click',()=>applyAccent(s.dataset.accent));\n  });\n\n  // ---- copy brew ----\n  const cb = document.getElementById('copyBrew');\n  cb.addEventListener('click',()=>{\n    navigator.clipboard && navigator.clipboard.writeText('brew install --cask visualsync');\n    const o = cb.textContent; cb.textContent = (document.documentElement.lang==='it'?'Copiato ✓':'Copied ✓');\n    setTimeout(()=>applyLang(document.documentElement.lang),1400);\n  });\n\n  // ---- restore prefs ----\n  applyLang(localStorage.getItem('vs_lang') || 'en');\n  applyAccent(localStorage.getItem('vs_accent') || 'sky');\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
